<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Notas</title>
  <link rel="stylesheet" href="pg.css">
</head>
<body>

<header>
  <h1>Sistema de Gerenciamento de Notas</h1>
</header>

<div class="container">

  <!-- Cadastro Professor/Aluno -->
  <div id="cadastro" class="card">
    <h2>Cadastro</h2>
    <select id="tipoUsuario">
      <option value="prof">Professor</option>
      <option value="aluno">Aluno</option>
    </select>

    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="turmaAluno" placeholder="Turma (apenas aluno)">

    <button onclick="entrar()">Entrar</button>
  </div>

  <!-- Turmas Professor -->
  <div id="turmas" class="card hidden">
    <button onclick="logout()">Sair</button>
    <h2>Turmas</h2>
    <input type="text" id="nomeTurma" placeholder="Nome da Turma">
    <button onclick="adicionarTurma()">Adicionar Turma</button>
    <div id="listaTurmas"></div>
  </div>

  <!-- Atividades Professor -->
  <div id="atividades" class="card hidden">
    <button onclick="logout()">Sair</button>
    <h2 id="tituloTurma"></h2>

    <input type="text" id="nomeAtividade" placeholder="Nome da Atividade">
    <input type="date" id="prazo">
    <button onclick="addAtividade()">Adicionar Atividade</button>

    <div id="listaAtividades"></div>

    <div id="lancarNotas" class="hidden">
      <h3>Lançar Nota</h3>
      <select id="selectAluno"></select>
      <input type="number" id="inputNota" placeholder="Nota">
      <button onclick="salvarNota()">Salvar Nota</button>
    </div>

    <button onclick="voltar()">Voltar</button>
  </div>

  <!-- Área do Aluno -->
  <div id="areaAluno" class="card hidden">
    <h2 id="tituloAluno"></h2>
    <div id="atividadesAluno"></div>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<script>
  let turmas = [];
  let alunos = [];
  let turmaAtual = null;
  let usuarioAtual = null;
  let atividadeSelecionada = null;

  function entrar() {
    const tipo = document.getElementById("tipoUsuario").value;
    const nome = document.getElementById("nome").value;
    const turmaNome = document.getElementById("turmaAluno").value;

    if (tipo === "prof") {
      usuarioAtual = { tipo, nome };
      document.getElementById("cadastro").classList.add("hidden");
      document.getElementById("turmas").classList.remove("hidden");
    } else {
      const turma = turmas.find(t => t.nome === turmaNome);
      if (!turma) {
        alert("Turma não existe!");
        return;
      }

      const aluno = { nome, turma: turmaNome };
      alunos.push(aluno);
      usuarioAtual = aluno;

      document.getElementById("cadastro").classList.add("hidden");
      document.getElementById("areaAluno").classList.remove("hidden");
      document.getElementById("tituloAluno").innerText = `Aluno: ${nome} - Turma: ${turmaNome}`;
      renderAluno();
    }
  }

  function adicionarTurma() {
    const nome = document.getElementById("nomeTurma").value;
    if (!nome) return;

    turmas.push({ nome, atividades: [] });
    renderTurmas();
  }

  function renderTurmas() {
    const lista = document.getElementById("listaTurmas");
    lista.innerHTML = "";

    turmas.forEach((turma, index) => {
      const div = document.createElement("div");
      div.className = "turma-item";
      div.innerText = turma.nome;
      div.onclick = () => abrirTurma(index);
      lista.appendChild(div);
    });
  }

  function abrirTurma(index) {
    turmaAtual = turmas[index];
    document.getElementById("turmas").classList.add("hidden");
    document.getElementById("atividades").classList.remove("hidden");
    document.getElementById("tituloTurma").innerText = turmaAtual.nome;
    renderAtividades();
  }

  function addAtividade() {
    const nome = document.getElementById("nomeAtividade").value;
    const prazo = document.getElementById("prazo").value;

    if (!nome) return;

    turmaAtual.atividades.push({ nome, prazo, notas: {}, liberado: false });
    renderAtividades();
  }

  function renderAtividades() {
    const lista = document.getElementById("listaAtividades");
    lista.innerHTML = "";

    turmaAtual.atividades.forEach((atv, index) => {
      const totalAlunos = alunos.filter(a => a.turma === turmaAtual.nome).length;
      const fizeram = Object.keys(atv.notas).length;

      const div = document.createElement("div");
      div.className = "atividade";
      div.innerHTML = `
        <strong>${atv.nome}</strong><br>
        Prazo: ${atv.prazo}<br>
        Alunos: ${fizeram}/${totalAlunos}<br>
        <button onclick="abrirLancamento(${index})">Lançar Nota</button>
        <button onclick="editarAtividade(${index})">Editar</button>
        <button onclick="removerAtividade(${index})">Remover</button>
        <button onclick="liberarNotas(${index})">Liberar Notas</button>
      `;
      lista.appendChild(div);
    });
  }

  function abrirLancamento(index) {
    atividadeSelecionada = turmaAtual.atividades[index];
    const select = document.getElementById("selectAluno");
    select.innerHTML = "";

    alunos
      .filter(a => a.turma === turmaAtual.nome)
      .forEach(aluno => {
        const option = document.createElement("option");
        option.value = aluno.nome;
        option.text = aluno.nome;
        select.appendChild(option);
      });

    document.getElementById("lancarNotas").classList.remove("hidden");
  }

  function salvarNota() {
    const aluno = document.getElementById("selectAluno").value;
    const nota = document.getElementById("inputNota").value;

    if (!aluno || nota === "") return;

    atividadeSelecionada.notas[aluno] = nota;
    renderAtividades();
    alert("Nota salva!");
  }

  function editarAtividade(index) {
    const novoNome = prompt("Novo nome da atividade:");
    if (novoNome) turmaAtual.atividades[index].nome = novoNome;
    renderAtividades();
  }

  function removerAtividade(index) {
    turmaAtual.atividades.splice(index, 1);
    renderAtividades();
  }

  function liberarNotas(index) {
    turmaAtual.atividades[index].liberado = true;
    alert("Notas liberadas!");
  }

  function renderAluno() {
    const lista = document.getElementById("atividadesAluno");
    lista.innerHTML = "";

    const turma = turmas.find(t => t.nome === usuarioAtual.turma);

    turma.atividades.forEach(atv => {
      const div = document.createElement("div");
      div.className = "atividade";

      let nota = atv.notas[usuarioAtual.nome] || "-";

      div.innerHTML = `
        <strong>${atv.nome}</strong><br>
        Prazo: ${atv.prazo}<br>
        Nota: ${atv.liberado ? nota : "Aguardando liberação"}
      `;
      lista.appendChild(div);
    });
  }

  function voltar() {
    document.getElementById("atividades").classList.add("hidden");
    document.getElementById("turmas").classList.remove("hidden");
  }

  function logout() {
    location.reload();
  }
</script>

</body>
</html>
